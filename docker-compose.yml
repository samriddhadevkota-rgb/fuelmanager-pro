
services:
  postgres:
    image: postgres:16-alpine
    container_name: fuelmanager_postgres
    environment:
      POSTGRES_DB: fuel_db
      POSTGRES_USER: fuel_user
      POSTGRES_PASSWORD: fuel_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuel_user -d fuel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fuelmanager

  redis:
    image: redis:7-alpine
    container_name: fuelmanager_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fuelmanager

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: fuelmanager_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: fuel_user
      RABBITMQ_DEFAULT_PASS: fuel_pass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5674:5672"
      - "15674:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fuelmanager

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fuelmanager_backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - fuelmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fuelmanager_celery
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    networks:
      - fuelmanager

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fuelmanager_celery_beat
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - celery
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - fuelmanager

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fuelmanager_frontend
    env_file:
      - .env
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - fuelmanager

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: fuelmanager_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - media_data:/media
    networks:
      - fuelmanager

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  media_data:

networks:
  fuelmanager:
    driver: bridge
